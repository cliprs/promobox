<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görsel Hikaye | Altın vs Robot</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --gold-metallic: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            --blue-neon: #00f2fe;
            --bg: #010409;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: #fff; height: 100vh; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* TOP STRIP */
        .header-strip {
            height: 20dvh; min-height: 120px; background: var(--gold-metallic); display: flex; align-items: center; padding: 0 25px; position: relative; z-index: 100;
            clip-path: polygon(0 0, 100% 0, 100% 75%, 0 100%); box-shadow: 0 15px 50px rgba(0,0,0,0.6); overflow: hidden;
        }
        .header-strip h1 { color: #1a1401; display: flex; flex-direction: column; line-height: 0.85; text-transform: uppercase; margin-top: -10px; }
        .line-1 { font-size: clamp(32px, 10vw, 56px); font-weight: 900; letter-spacing: -2px; }
        .line-2 { font-size: clamp(16px, 5vw, 24px); font-weight: 700; letter-spacing: -1px; margin-top: 5px; }

        /* SCENE */
        .scene { flex: 1; position: relative; padding: 15px; display: flex; flex-direction: column; justify-content: space-evenly; gap: 10px; background: radial-gradient(circle at center, #0d1117 0%, #010409 100%); overflow: hidden; }

        /* Visual Cards */
        .visual-card {
            position: relative; width: 100%; max-width: 320px; border-radius: 15px; overflow: hidden;
            background: #000; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* Gold Card (Dusty / Passive) */
        .card-gold { align-self: flex-start; border-left: 4px solid #444; }
        .img-container { width: 100%; height: 120px; position: relative; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; filter: sepia(0.5) contrast(1.2); }
        /* Dust Overlay */
        .dust-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.3; pointer-events: none; }
        
        /* Robot Card (Neon / Active) */
        .card-robot { align-self: flex-end; border-right: 4px solid var(--blue-neon); box-shadow: 0 0 20px rgba(0, 242, 254, 0.1); }
        .img-active { filter: hue-rotate(180deg) brightness(1.2); }

        .card-content { padding: 10px 15px; background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent); }
        .card-content h4 { font-size: 14px; font-weight: 800; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
        .card-content p { font-size: 11px; color: #94a3b8; line-height: 1.3; font-weight: 300; }

        /* Floating Profits */
        .profit-tick {
            position: absolute; color: #00ff88; font-weight: 900; font-family: monospace; font-size: 14px;
            pointer-events: none; animation: tick-up 2s forwards; z-index: 10;
        }
        @keyframes tick-up { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-80px); opacity: 0; } }

        /* FOOTER */
        .footer-banner {
            height: 12dvh; min-height: 70px; background: var(--gold-metallic); display: flex; align-items: center; justify-content: center; position: relative; z-index: 100;
            clip-path: polygon(0 35%, 100% 0, 100% 100%, 0 100%); cursor: pointer; padding-bottom: env(safe-area-inset-bottom);
        }
        .footer-banner h2 { color: #1a1401; font-size: 18px; font-weight: 800; letter-spacing: 12px; text-transform: uppercase; margin-top: 5px; }

        /* Responsive Adjustments for very small heights */
        @media (max-height: 600px) {
            .header-strip { height: 15dvh; min-height: 90px; }
            .img-container { height: 80px; }
            .card-content p { display: none; } /* Metni gizleyerek sadece başlığı bırakıyoruz */
            .scene { gap: 5px; }
        }

        @media (max-width: 360px) {
            .line-1 { font-size: 32px; }
            .line-2 { font-size: 16px; }
            .footer-banner h2 { font-size: 14px; letter-spacing: 8px; }
        }

    </style>
</head>
<body>

    <div class="header-strip">
        <h1 class="animate__animated animate__fadeInDown">
            <span class="line-1">PARANIZ</span>
            <span class="line-2">Beklesin mi? Çalışsın mı?</span>
        </h1>
    </div>

    <div class="scene">
        
        <!-- PASSIVE GOLD CARD -->
        <div class="visual-card card-gold animate__animated animate__fadeInLeft" style="animation-delay: 0.2s;">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1610375461246-83df859d849d?auto=format&fit=crop&w=600&q=80" alt="Forgotten Gold">
                <div class="dust-overlay"></div>
            </div>
            <div class="card-content">
                <h4 style="color: #888;">Duran Altın Pasiftir.</h4>
                <p>Tozlu raflarda bekleyen bir sermaye... Sadece fiyatlar yükselince değer kazanır.</p>
            </div>
        </div>

        <!-- ACTIVE ROBOT CARD -->
        <div class="visual-card card-robot animate__animated animate__fadeInRight" id="robot-card" style="animation-delay: 0.4s;">
            <div class="img-container">
                <img class="img-active" src="https://images.unsplash.com/photo-1639762681485-074b7f938ba0?auto=format&fit=crop&w=600&q=80" alt="Active AI">
            </div>
            <div class="card-content" style="text-align: right;">
                <h4 style="color: var(--blue-neon);">Robot Aktiftir.</h4>
                <p>Piyasayı 7/24 işleyen, her anı kazanca dönüştüren canlı bir teknoloji.</p>
            </div>
        </div>

    </div>

    <div class="footer-banner animate__animated animate__slideInUp" onclick="window.location.href='https://cliprs.github.io/sunumrobot'">
        <h2 class="animate__animated animate__pulse animate__infinite">KEŞFET</h2>
    </div>

    <script>
        const robotCard = document.getElementById('robot-card');
        function spawnProfit() {
            if (document.hidden) return;
            const p = document.createElement('div');
            p.className = 'profit-tick';
            p.innerText = '+$' + (Math.random() * 25 + 5).toFixed(2);
            p.style.right = (Math.random() * 40 + 10) + '%';
            p.style.bottom = '30%';
            robotCard.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }
        setInterval(spawnProfit, 1000);
    </script>
</body>
</html>
